name: harness-quality

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  repository-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install repository dependencies
        run: uv sync --frozen --all-groups

      - name: Run complete repository quality gate
        run: uv run python scripts/quality_gate.py

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Run harness regression tests
        run: python -m unittest discover -s tests -v

      - name: Compile distributed Python
        run: >-
          python -m compileall -q bootstrap.py template/.codex/hooks template/scripts
          plugins/python-engineering-harness/scripts

      - name: Lint harness distribution
        run: >-
          uvx --from ruff==0.15.20 ruff check --isolated bootstrap.py tests
          template/.codex/hooks template/scripts plugins/python-engineering-harness/scripts

      - name: Reject whitespace errors
        run: git diff --check

      - name: Check sibling-harness parity manifest
        run: python scripts/parity_check.py

  generated-profiles:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        profile: [service, library, workspace]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Render profile
        run: >-
          python3 bootstrap.py --name profile-${{ matrix.profile }}
          --package profile_${{ matrix.profile }} --target ../generated
          --profile ${{ matrix.profile }} --python ${{ matrix.python-version }}
          --git-init --lock

      - name: Check harness metadata and branch alignment
        run: python3 bootstrap.py --target ../generated --check

      - name: Verify generated lockfile is up to date
        if: matrix.profile == 'service'
        working-directory: ../generated
        run: uv lock --check

      - name: Frozen sync with observability
        if: matrix.profile == 'service'
        working-directory: ../generated
        run: uv sync --frozen --all-packages --all-groups --extra observability

      - name: Verify generated lockfile is up to date
        if: matrix.profile != 'service'
        working-directory: ../generated
        run: uv lock --check

      - name: Frozen sync
        if: matrix.profile != 'service'
        working-directory: ../generated
        run: uv sync --frozen --all-packages --all-groups

      - name: Run profile-owned quality gate
        working-directory: ../generated
        run: uv run python scripts/quality_gate.py

      - name: Build service runtime image
        if: matrix.profile == 'service'
        working-directory: ../generated
        run: docker build -t harness-profile-service .

      - name: Assert non-service profiles have no runtime Dockerfile
        if: matrix.profile != 'service'
        working-directory: ../generated
        run: test ! -e Dockerfile
