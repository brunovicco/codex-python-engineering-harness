[project]
name = "{{PROJECT_NAME}}"
version = "0.1.0"
description = "Python library generated from the Python engineering harness"
readme = "README.md"
requires-python = ">={{PYTHON_VERSION}},<3.15"
dependencies = []

[dependency-groups]
dev = [
    "bandit[toml]>=1.8",
    "mypy>=1.16",
    "pip-audit>=2.9",
    "pytest>=8.4",
    "pytest-cov>=6.2",
    "ruff>=0.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/{{PACKAGE_NAME}}"]

[tool.ruff]
target-version = "{{RUFF_TARGET_VERSION}}"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM", "RUF", "ANN", "D", "S"]
ignore = ["ANN401", "D203", "D213"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["D", "S101", "ANN"]
"scripts/**/*.py" = ["D"]
# scripts/_vendor_loop_schemas/models.py quotes its `from_dict` classmethods'
# self-referencing return annotations on purpose (see that file's own header
# comment): the quotes are load-bearing on Python 3.12/3.13 and only look
# removable to ruff's UP037 when this project's own target-version is 3.14.
# Suppressed here (not with an inline noqa) because an inline noqa becomes an
# unused-directive RUF100 error on 3.12/3.13, where UP037 never fires.
"scripts/_vendor_loop_schemas/models.py" = ["UP037"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "{{PYTHON_VERSION}}"
strict = true
warn_unused_configs = true
warn_unused_ignores = true
show_error_codes = true
pretty = true
mypy_path = "src"

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_decorators = false

[tool.pytest.ini_options]
addopts = "--strict-config --strict-markers --cov=src/{{PACKAGE_NAME}} --cov-report=term-missing"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["src/{{PACKAGE_NAME}}"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80

[tool.bandit]
exclude_dirs = ["tests"]
skips = []

[tool.engineering-harness.quality]
source-roots = ["src"]
test-roots = ["tests"]

[tool.engineering-harness.architecture]
source-roots = ["src"]
clean-architecture = false
